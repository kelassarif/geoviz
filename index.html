<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>geovizwiz</title>
  <link rel="icon" href="data:," />
  <script type="module" crossorigin src="./assets/index-BX1JA_b7.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DwUhsmFz.css" />
  <style>
    html, body, #app {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    body {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.addEventListener("load", async () => {
      const DATA_URL = "./babakan_ciparay.parquet";

      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      async function waitFor(fn, timeout = 30000, interval = 300) {
        const start = Date.now();
        while (Date.now() - start < timeout) {
          const result = fn();
          if (result) return result;
          await sleep(interval);
        }
        throw new Error("Timeout waiting for app UI");
      }

      async function loadParquetIntoInput() {
        const response = await fetch(DATA_URL);
        if (!response.ok) {
          throw new Error("Data file not found: " + DATA_URL);
        }

        const blob = await response.blob();
        const file = new File([blob], "babakan_ciparay.parquet", {
          type: "application/octet-stream"
        });

        const input = await waitFor(() => document.getElementById("file"), 60000, 400);

        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        input.dispatchEvent(new Event("change", { bubbles: true }));
      }

      async function confirmModalIfPresent(overlayId, buttonId) {
        try {
          await waitFor(() => {
            const overlay = document.getElementById(overlayId);
            return overlay && overlay.classList.contains("show") ? overlay : null;
          }, 8000, 250);

          const btn = await waitFor(() => document.getElementById(buttonId), 5000, 250);
          btn.click();
          await sleep(500);
        } catch (e) {
          // modal not shown, skip
        }
      }

      async function handleSizeModalIfPresent() {
        try {
          await waitFor(() => {
            const overlay = document.getElementById("sizeOverlay");
            return overlay && overlay.classList.contains("show") ? overlay : null;
          }, 10000, 250);

          const landField = document.getElementById("landField");
          const landUnit = document.getElementById("landUnit");
          const btnSizeOk = document.getElementById("btnSizeOk");

          if (landField) {
            const landFieldOptions = [...landField.options];
            const luasOption = landFieldOptions.find(o => o.value === "luasbidang");
            if (luasOption) {
              landField.value = "luasbidang";
              landField.dispatchEvent(new Event("change", { bubbles: true }));
            }
          }

          if (landUnit) {
            const unitOptions = [...landUnit.options];
            const sqmOption =
              unitOptions.find(o => (o.value || "").toLowerCase().includes("sqm")) ||
              unitOptions.find(o => (o.text || "").toLowerCase().includes("square meter")) ||
              unitOptions.find(o => (o.text || "").toLowerCase().includes("m²")) ||
              unitOptions.find(o => (o.text || "").toLowerCase().includes("m2"));

            if (sqmOption) {
              landUnit.value = sqmOption.value;
              landUnit.dispatchEvent(new Event("change", { bubbles: true }));
            }
          }

          if (btnSizeOk) {
            btnSizeOk.click();
            await sleep(700);
          }
        } catch (e) {
          // modal not shown, skip
        }
      }

      async function waitForFieldReady() {
        return await waitFor(() => {
          const field = document.getElementById("field");
          return field && field.options && field.options.length > 1 ? field : null;
        }, 60000, 400);
      }

      async function enable3DView() {
        const field = await waitForFieldReady();

        const values = [...field.options].map(o => o.value);
        if (values.includes("predicted")) {
          field.value = "predicted";
        } else if (values.includes("luasbidang")) {
          field.value = "luasbidang";
        } else if (field.options.length > 1) {
          field.selectedIndex = 1;
        }
        field.dispatchEvent(new Event("change", { bubbles: true }));

        await sleep(1000);

        const paintBtn = document.getElementById("btnPaintMenu");
        if (paintBtn) paintBtn.click();

        await sleep(800);

        const enable3D = document.getElementById("enable3D");
        if (enable3D && !enable3D.checked) {
          enable3D.checked = true;
          enable3D.dispatchEvent(new Event("change", { bubbles: true }));
        }

        await sleep(500);

        const mult = document.getElementById("mult");
        if (mult) {
          mult.value = "0.00001";
          mult.dispatchEvent(new Event("input", { bubbles: true }));
          mult.dispatchEvent(new Event("change", { bubbles: true }));
        }

        const units = document.getElementById("units");
        if (units && [...units.options].some(o => o.value === "meters")) {
          units.value = "meters";
          units.dispatchEvent(new Event("change", { bubbles: true }));
        }

        await sleep(800);

        const isoBtn = document.querySelector('[data-view="iso"]');
        if (isoBtn) isoBtn.click();

        await sleep(800);

        const zoomBtn = document.getElementById("btn-zoomto");
        if (zoomBtn) zoomBtn.click();
      }

      try {
        await sleep(2000);

        await loadParquetIntoInput();

        await confirmModalIfPresent("numericModalOverlay", "btnConfirmNumericModal");
        await confirmModalIfPresent("categoricalModalOverlay", "btnConfirmCategoricalModal");
        await handleSizeModalIfPresent();

        await enable3DView();

        console.log("Babakan Ciparay loaded automatically in 3D.");
      } catch (err) {
        console.error("Autoload failed:", err);
      }
    });
  </script>
</body>
</html>
