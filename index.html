<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoViz Bandung</title>

  <link rel="icon" href="data:,">

  <script type="module" crossorigin src="./assets/index-BX1JA_b7.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DwUhsmFz.css">

  <style>
    html,body,#app{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
window.addEventListener("load", async () => {
  const parquetUrl = "./babakan_ciparay.parquet";

  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  async function waitFor(fn, timeout = 30000, interval = 300) {
    const start = Date.now();
    while (Date.now() - start < timeout) {
      const result = fn();
      if (result) return result;
      await sleep(interval);
    }
    throw new Error("Timeout waiting for UI/state");
  }

  async function loadParquetAsFile() {
    const response = await fetch(parquetUrl);
    if (!response.ok) throw new Error("Failed to fetch " + parquetUrl);

    const blob = await response.blob();
    const file = new File([blob], "babakan_ciparay.parquet", {
      type: "application/octet-stream"
    });

    const input = await waitFor(() => document.getElementById("file"));
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    input.dispatchEvent(new Event("change", { bubbles: true }));
  }

  async function waitForFieldDropdown() {
    return await waitFor(() => {
      const field = document.getElementById("field");
      return field && field.options && field.options.length > 1 ? field : null;
    }, 60000, 300);
  }

  async function enable3DView() {
    const field = await waitForFieldDropdown();

    const available = [...field.options].map(o => o.value);
    if (available.includes("predicted")) {
      field.value = "predicted";
      field.dispatchEvent(new Event("change", { bubbles: true }));
    }

    await sleep(1000);

    const paintBtn = document.getElementById("btnPaintMenu");
    if (paintBtn) paintBtn.click();

    await sleep(800);

    const enable3D = document.getElementById("enable3D");
    if (enable3D && !enable3D.checked) {
      enable3D.checked = true;
      enable3D.dispatchEvent(new Event("change", { bubbles: true }));
    }

    await sleep(500);

    const mult = document.getElementById("mult");
    if (mult) {
      mult.value = "0.00001";
      mult.dispatchEvent(new Event("input", { bubbles: true }));
      mult.dispatchEvent(new Event("change", { bubbles: true }));
    }

    const units = document.getElementById("units");
    if (units && [...units.options].some(o => o.value === "meters")) {
      units.value = "meters";
      units.dispatchEvent(new Event("change", { bubbles: true }));
    }

    await sleep(700);

    const isoBtn = document.querySelector('[data-view="iso"]');
    if (isoBtn) isoBtn.click();

    await sleep(700);

    const zoomBtn = document.getElementById("btn-zoomto");
    if (zoomBtn) zoomBtn.click();
  }

  try {
    await sleep(2000);
    await loadParquetAsFile();
    await enable3DView();
    console.log("3D map loaded automatically.");
  } catch (err) {
    console.error("Auto-3D workflow failed:", err);
  }
});
</script>

</body>
</html>
