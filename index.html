<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" crossorigin src="./assets/index-BX1JA_b7.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DwUhsmFz.css">

  <style>
    html,body,#app{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

window.addEventListener("load", async () => {

  const parquetUrl = "./babakan_ciparay.parquet"

  const sleep = (ms)=>new Promise(r=>setTimeout(r,ms))

  async function waitFor(fn,timeout=30000){

    const start=Date.now()

    while(Date.now()-start<timeout){

      const r=fn()

      if(r) return r

      await sleep(300)
    }

    throw "timeout"
  }

  async function loadFile(){

    const res = await fetch(parquetUrl)

    const blob = await res.blob()

    const file = new File([blob],"babakan_ciparay.parquet")

    const input = await waitFor(()=>document.getElementById("file"))

    const dt = new DataTransfer()

    dt.items.add(file)

    input.files = dt.files

    input.dispatchEvent(new Event("change",{bubbles:true}))
  }

  async function enable3D(){

    const field = await waitFor(()=>{

      const f=document.getElementById("field")

      if(f && f.options.length>1) return f
    })

    const values=[...field.options].map(o=>o.value)

    if(values.includes("predicted")) field.value="predicted"
    else if(values.includes("luasbidang")) field.value="luasbidang"

    field.dispatchEvent(new Event("change",{bubbles:true}))

    await sleep(800)

    document.getElementById("btnPaintMenu")?.click()

    await sleep(800)

    const enable3D=document.getElementById("enable3D")

    if(enable3D){

      enable3D.checked=true

      enable3D.dispatchEvent(new Event("change",{bubbles:true}))
    }

    await sleep(800)

    document.querySelector('[data-view="iso"]')?.click()

    await sleep(800)

    document.getElementById("btn-zoomto")?.click()

  }

  try{

    await sleep(2000)

    await loadFile()

    await enable3D()

    console.log("3D map loaded")

  }catch(e){

    console.log(e)

  }

})

</script>

</body>
</html>
