<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeoViz Bandung 3D</title>

<link rel="icon" href="data:,">

<script type="module" crossorigin src="./assets/index-BX1JA_b7.js"></script>
<link rel="stylesheet" crossorigin href="./assets/index-DwUhsmFz.css">

<style>
html,body,#app{
height:100%;
margin:0;
font-family:system-ui,sans-serif;
}

#map{
position:absolute;
left:0;
top:0;
right:0;
bottom:0;
}

#controls{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
z-index:5;
font-size:13px;
}
</style>
</head>

<body>

<div id="app">
<div id="map"></div>

<div id="controls">
<button id="btn-zoomto">Zoom to data</button>
<select id="field"></select>

<button id="btnPaintMenu">Paint</button>

<label>
<input type="checkbox" id="enable3D">
Enable 3D
</label>

<input id="mult" type="number" value="0.00001" step="0.00001">

<select id="units">
<option value="meters">meters</option>
</select>

<button data-view="iso">3D View</button>
</div>

<input id="file" type="file" style="display:none">

</div>

<script>

window.addEventListener("load",async()=>{

const parquetUrl="./babakan_ciparay.parquet"

const sleep=(ms)=>new Promise(r=>setTimeout(r,ms))

async function waitFor(fn,timeout=30000){

const start=Date.now()

while(Date.now()-start<timeout){

const r=fn()

if(r)return r

await sleep(300)

}

throw "timeout"

}

async function loadFile(){

const res=await fetch(parquetUrl)

const blob=await res.blob()

const file=new File([blob],"babakan_ciparay.parquet")

const input=await waitFor(()=>document.getElementById("file"))

const dt=new DataTransfer()

dt.items.add(file)

input.files=dt.files

input.dispatchEvent(new Event("change",{bubbles:true}))

}

async function waitField(){

return await waitFor(()=>{

const f=document.getElementById("field")

if(f && f.options.length>1)return f

})

}

async function enable3D(){

const field=await waitField()

const options=[...field.options].map(o=>o.value)

if(options.includes("predicted"))field.value="predicted"

else if(options.includes("luasbidang"))field.value="luasbidang"

field.dispatchEvent(new Event("change",{bubbles:true}))

await sleep(1000)

document.getElementById("btnPaintMenu").click()

await sleep(600)

const enable3D=document.getElementById("enable3D")

enable3D.checked=true

enable3D.dispatchEvent(new Event("change",{bubbles:true}))

await sleep(600)

document.getElementById("mult").value="0.00001"

document.getElementById("mult")
.dispatchEvent(new Event("change",{bubbles:true}))

await sleep(600)

document.querySelector('[data-view="iso"]').click()

await sleep(600)

document.getElementById("btn-zoomto").click()

}

try{

await sleep(1500)

await loadFile()

await enable3D()

console.log("3D map loaded")

}catch(e){

console.error(e)

}

})

</script>

</body>
</html>
